<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI颜值测评 - 专业脸型五官分析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.1);
        }
        
        .header {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 32px;
            color: #333;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #666;
            font-size: 16px;
        }
        
        .upload-section {
            border: 3px dashed #ddd;
            border-radius: 20px;
            padding: 60px 40px;
            text-align: center;
            margin-bottom: 30px;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-section:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .upload-icon {
            font-size: 60px;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }
        
        .upload-hint {
            font-size: 14px;
            color: #999;
        }
        
        #fileInput {
            display: none;
        }
        
        .preview-section {
            display: none;
            margin-bottom: 30px;
        }
        
        .preview-section.active {
            display: block;
        }
        
        .preview-image {
            width: 100%;
            max-width: 400px;
            margin: 0 auto 20px;
            display: block;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .analyze-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 0 auto;
        }
        
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .analyze-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        
        .loading.active {
            display: block;
        }
        
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .result-section {
            display: none;
        }
        
        .result-section.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .score-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
        }
        
        .score-label {
            font-size: 18px;
            margin-bottom: 10px;
            opacity: 0.9;
        }
        
        .score-value {
            font-size: 72px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .score-desc {
            font-size: 20px;
            opacity: 0.9;
        }
        
        .analysis-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .analysis-card {
            background: #f8f9ff;
            border-radius: 16px;
            padding: 25px;
            border-left: 4px solid #667eea;
        }
        
        .analysis-card h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .analysis-card .icon {
            font-size: 24px;
        }
        
        .analysis-content {
            color: #555;
            line-height: 1.8;
            font-size: 15px;
        }
        
        .face-type {
            background: #fff3e0;
            border-left-color: #ff9800;
        }
        
        .face-type h3 {
            color: #e65100;
        }
        
        .features {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }
        
        .features h3 {
            color: #2e7d32;
        }
        
        .suggestions {
            background: #e3f2fd;
            border-left-color: #2196f3;
        }
        
        .suggestions h3 {
            color: #1565c0;
        }
        
        .detail-section {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
        }
        
        .detail-section h4 {
            color: #333;
            font-size: 16px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .feature-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        
        .feature-item:last-child {
            border-bottom: none;
        }
        
        .feature-name {
            color: #555;
            font-size: 15px;
        }
        
        .feature-score {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .score-bar {
            width: 100px;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .score-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .score-number {
            font-weight: bold;
            color: #667eea;
            min-width: 30px;
            text-align: right;
        }
        
        .recommendation {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 16px;
            padding: 25px;
            margin-top: 20px;
        }
        
        .recommendation h4 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        
        .recommendation ul {
            list-style: none;
            padding: 0;
        }
        
        .recommendation li {
            padding: 10px 0;
            padding-left: 25px;
            position: relative;
            color: #555;
            line-height: 1.6;
        }
        
        .recommendation li::before {
            content: "✨";
            position: absolute;
            left: 0;
        }
        
        .restart-btn {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
            padding: 16px 40px;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin: 30px auto 0;
        }
        
        .restart-btn:hover {
            background: #667eea;
            color: white;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .score-value {
                font-size: 56px;
            }
            
            .analysis-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌸 AI颜值测评</h1>
            <p>专业脸型分析 + 五官特征评估 + 个性化变美建议</p>
        </div>
        
        <div class="upload-section" id="uploadSection">
            <div class="upload-icon">📷</div>
            <div class="upload-text">点击或拖拽上传照片</div>
            <div class="upload-hint">支持 JPG、PNG 格式，建议上传清晰的正面照</div>
        </div>
        
        <input type="file" id="fileInput" accept="image/*">
        
        <div class="preview-section" id="previewSection">
            <img class="preview-image" id="previewImage" alt="预览">
            <button class="analyze-btn" id="analyzeBtn" onclick="startAnalysis()">
                🔍 开始智能分析
            </button>
        </div>
        
        <div class="loading" id="loadingSection">
            <div class="spinner"></div>
            <p>AI正在分析您的五官特征...</p>
            <p style="font-size: 14px; color: #999; margin-top: 10px;">正在评估脸型、三庭五眼、五官比例</p>
        </div>
        
        <div class="result-section" id="resultSection">
            <div class="score-card">
                <div class="score-label">综合颜值评分</div>
                <div class="score-value" id="totalScore">--</div>
                <div class="score-desc" id="scoreDesc">--</div>
            </div>
            
            <div class="analysis-grid">
                <div class="analysis-card face-type">
                    <h3><span class="icon">👤</span> 脸型分析</h3>
                    <div class="analysis-content" id="faceTypeResult">
                        分析中...
                    </div>
                </div>
                
                <div class="analysis-card features">
                    <h3><span class="icon">✨</span> 五官特征</h3>
                    <div class="analysis-content" id="featuresResult">
                        分析中...
                    </div>
                </div>
                
                <div class="analysis-card suggestions">
                    <h3><span class="icon">💡</span> 变美建议</h3>
                    <div class="analysis-content" id="suggestionsResult">
                        生成中...
                    </div>
                </div>
            </div>
            
            <div class="detail-section">
                <h4>📊 五官详细评分</h4>
                <div id="detailScores"></div>
            </div>
            
            <div class="recommendation">
                <h4>🎯 专属变美方案</h4>
                <ul id="recommendationList"></ul>
            </div>
            
            <button class="restart-btn" onclick="restart()">重新测试</button>
        </div>
    </div>

    <script>
        // 脸型类型定义
        const faceTypes = {
            straight: {
                name: "直面型",
                score: 95,
                desc: "眉心—鼻尖—颏前点（E线）基本成直线，上下唇位置协调。这是颌面美学的标准模板，侧面线条流畅自然。",
                features: "下唇略贴E线，上唇微后收0.5-1mm",
                suggestion: "你的脸型非常标准，保持现状即可。可以尝试各种发型和妆容风格。"
            },
            slightlyConvex: {
                name: "微凸面型",
                score: 88,
                desc: "嘴唇轻微超出E线，但不突兀。面中柔和前展，无明显下巴后缩或龅牙感。",
                features: "东亚美人常见，自带娇俏明艳感",
                suggestion: "微凸面型很有东方美感。避免过于厚重的刘海，侧分或中分更能展现你的气质。"
            },
            convex: {
                name: "凸面型（重度凸嘴）",
                score: 65,
                desc: "上下唇显著前突，远离E线，常伴随上颌前突、下巴后缩、龅牙。侧面弧度外扩明显。",
                features: "易显笨重、土气，需要修饰",
                suggestion: "建议通过妆容修饰：深色唇妆收敛视觉，高光打在下巴和鼻梁，拉长面部线条。避免齐刘海。"
            },
            slightlyConcave: {
                name: "微凹面型",
                score: 82,
                desc: "嘴唇轻微落在E线内侧，上颌略后缩，鼻基底偏平，线条内收柔和。",
                features: "可能伴随轻微法令纹，气质温婉",
                suggestion: "适合饱满唇妆增加立体感，腮红打在苹果肌提升气色。避免过于 flat 的妆容。"
            },
            concave: {
                name: "凹面型（月亮脸/地包天）",
                score: 60,
                desc: "上颌明显内收、下颌过度前伸，E线呈内凹月牙状，侧面'兜齿'感强。",
                features: "易显苦相、面部扁平",
                suggestion: "建议咨询正畸医生。妆容上：高光打在面中，阴影修饰下颌，避免浅色唇妆。"
            },
            fengjie: {
                name: "凤姐脸（复合凸面）",
                score: 50,
                desc: "上颌深突+下巴严重后缩的组合，侧面呈S形弯，嘴部是全脸最前突点。",
                features: "E线被嘴唇大幅顶出，颌面比例严重失衡",
                suggestion: "建议咨询正颌手术。日常可通过发型遮挡侧面，正面拍照时微微低头。"
            }
        };
        
        // 上传区域点击
        document.getElementById('uploadSection').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        
        // 文件选择
        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                handleFile(file);
            }
        });
        
        // 拖拽上传
        document.getElementById('uploadSection').addEventListener('dragover', (e) => {
            e.preventDefault();
            e.currentTarget.style.borderColor = '#667eea';
            e.currentTarget.style.background = '#f8f9ff';
        });
        
        document.getElementById('uploadSection').addEventListener('dragleave', (e) => {
            e.currentTarget.style.borderColor = '#ddd';
            e.currentTarget.style.background = 'white';
        });
        
        document.getElementById('uploadSection').addEventListener('drop', (e) => {
            e.preventDefault();
            e.currentTarget.style.borderColor = '#ddd';
            e.currentTarget.style.background = 'white';
            
            const file = e.dataTransfer.files[0];
            if (file && file.type.startsWith('image/')) {
                handleFile(file);
            }
        });
        
        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('previewImage').src = e.target.result;
                document.getElementById('uploadSection').style.display = 'none';
                document.getElementById('previewSection').classList.add('active');
            };
            reader.readAsDataURL(file);
        }
        
        function startAnalysis() {
            document.getElementById('previewSection').classList.remove('active');
            document.getElementById('loadingSection').classList.add('active');
            
            // 模拟分析过程
            setTimeout(() => {
                generateResult();
            }, 3000);
        }
        
        function generateResult() {
            // 随机生成结果（实际应用中这里应该是真实的AI分析）
            const faceTypeKeys = Object.keys(faceTypes);
            const randomFaceType = faceTypes[faceTypeKeys[Math.floor(Math.random() * faceTypeKeys.length)]];
            
            const totalScore = randomFaceType.score + Math.floor(Math.random() * 10 - 5);
            
            // 五官详细评分
            const featureScores = {
                '三庭比例': Math.floor(Math.random() * 20 + 75),
                '五眼分布': Math.floor(Math.random() * 20 + 75),
                '眼睛形态': Math.floor(Math.random() * 25 + 70),
                '鼻子立体度': Math.floor(Math.random() * 25 + 70),
                '唇形饱满度': Math.floor(Math.random() * 25 + 70),
                '下颌线条': Math.floor(Math.random() * 25 + 70)
            };
            
            // 显示总分
            document.getElementById('totalScore').textContent = totalScore;
            document.getElementById('scoreDesc').textContent = getScoreDesc(totalScore);
            
            // 显示脸型分析
            document.getElementById('faceTypeResult').innerHTML = `
                <strong style="color: #e65100; font-size: 18px;">${randomFaceType.name}</strong><br><br>
                ${randomFaceType.desc}<br><br>
                <strong>特征：</strong>${randomFaceType.features}
            `;
            
            // 显示五官特征
            const eyeSize = featureScores['眼睛形态'] > 85 ? '大而有神' : featureScores['眼睛形态'] > 75 ? '适中' : '偏小';
            const eyeSpacing = featureScores['五眼分布'] > 85 ? '标准' : '略宽';
            const noseScore = featureScores['鼻子立体度'] > 85 ? '立体挺拔' : featureScores['鼻子立体度'] > 75 ? '适中' : '偏扁平';
            
            document.getElementById('featuresResult').innerHTML = `
                <strong>眼睛：</strong>${eyeSize}，眼距${eyeSpacing}<br>
                <strong>鼻子：</strong>${noseScore}<br>
                <strong>嘴唇：</strong>${randomFaceType.name.includes('凸') ? '偏前突' : randomFaceType.name.includes('凹') ? '偏内收' : '位置适中'}<br>
                <strong>三庭：</strong>${featureScores['三庭比例'] > 80 ? '比例协调' : '略需调整'}
            `;
            
            // 显示建议
            document.getElementById('suggestionsResult').innerHTML = randomFaceType.suggestion;
            
            // 显示详细评分
            let detailHtml = '';
            for (const [name, score] of Object.entries(featureScores)) {
                const color = score >= 85 ? '#4caf50' : score >= 75 ? '#ff9800' : '#f44336';
                detailHtml += `
                    <div class="feature-item">
                        <span class="feature-name">${name}</span>
                        <div class="feature-score">
                            <div class="score-bar">
                                <div class="score-fill" style="width: ${score}%; background: ${color};"></div>
                            </div>
                            <span class="score-number">${score}</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('detailScores').innerHTML = detailHtml;
            
            // 生成推荐方案
            const recommendations = generateRecommendations(randomFaceType, featureScores);
            document.getElementById('recommendationList').innerHTML = recommendations.map(r => `<li>${r}</li>`).join('');
            
            // 显示结果
            document.getElementById('loadingSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('active');
        }
        
        function getScoreDesc(score) {
            if (score >= 90) return "颜值出众，人群中很亮眼 ✨";
            if (score >= 80) return "颜值在线，有自己的特色 🌟";
            if (score >= 70) return "颜值中等，有提升空间 💪";
            return "颜值普通，需要针对性改善 📈";
        }
        
        function generateRecommendations(faceType, scores) {
            const recs = [];
            
            // 根据脸型给建议
            if (faceType.name.includes('凸')) {
                recs.push('妆容：使用深色唇膏收敛视觉，避免珠光唇彩');
                recs.push('修容：高光打在下巴和鼻梁，侧影修饰颧骨');
                recs.push('发型：避免齐刘海，选择侧分长刘海修饰脸型');
            } else if (faceType.name.includes('凹')) {
                recs.push('妆容：饱满唇妆增加立体感，避免裸色唇膏');
                recs.push('高光：重点打在面中、额头和下巴，增加饱满度');
                recs.push('腮红：打在苹果肌，提升气色和立体感');
            } else if (faceType.name === '直面型') {
                recs.push('你的脸型很标准，可以尝试各种风格');
                recs.push('妆容：根据场合选择不同风格，无特别禁忌');
            }
            
            // 根据五官给建议
            if (scores['眼睛形态'] < 80) {
                recs.push('眼妆：使用眼线拉长眼型，睫毛膏增加神采');
            }
            if (scores['鼻子立体度'] < 80) {
                recs.push('鼻影：轻扫山根和鼻翼两侧，增加立体感');
            }
            if (scores['三庭比例'] < 80) {
                recs.push('发际线：可用发际线粉或刘海调整上庭比例');
            }
            
            recs.push('护肤：保持良好的作息和护肤习惯，皮肤状态是颜值基础');
            
            return recs;
        }
        
        function restart() {
            document.getElementById('resultSection').classList.remove('active');
            document.getElementById('uploadSection').style.display = 'block';
            document.getElementById('fileInput').value = '';
        }
    </script>
</body>
</html>
